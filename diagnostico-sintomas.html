<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Sintomas Respiratórios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #dddcd6;
    --border2: #c8c7c0;
    --text: #1a1a18;
    --text2: #5a5a56;
    --text3: #8a8a84;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-mid: #1D9E75;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-mid: #378ADD;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --amber-mid: #EF9F27;
    --purple: #3C3489;
    --purple-light: #EEEDFE;
    --purple-mid: #7F77DD;
    --red: #A32D2D;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }

  .container {
    width: 100%;
    max-width: 640px;
  }

  /* HEADER */
  .app-header {
    text-align: center;
    margin-bottom: 2rem;
    padding: 0 0.5rem;
  }
  .app-header .badge {
    display: inline-block;
    background: var(--teal-light);
    color: var(--teal);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .app-header h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .app-header p {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.7;
  }

  /* CARD PRINCIPAL */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    margin-bottom: 1rem;
  }

  /* PROGRESSO */
  .progress-section { margin-bottom: 1.5rem; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-meta span { font-size: 13px; color: var(--text3); }
  .progress-meta strong { font-size: 13px; color: var(--text); }
  .progress-track {
    background: var(--surface2);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--teal-mid);
    transition: width 0.35s ease;
  }

  /* PERGUNTA */
  .question-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  .question-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 1.25rem;
  }

  /* OPÇÕES */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
    line-height: 1.4;
  }
  .option-btn:hover {
    border-color: var(--teal-mid);
    background: #f0fdf9;
  }
  .option-btn.selected {
    border-color: var(--teal);
    background: var(--teal-light);
    color: #085041;
  }
  .option-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .option-btn.selected .option-icon {
    background: var(--teal);
    border-color: var(--teal);
    color: #fff;
  }

  /* NAV */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1.5rem;
    gap: 12px;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    border: 1.5px solid transparent;
  }
  .btn-ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--text2);
  }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-primary {
    background: var(--teal);
    border-color: var(--teal);
    color: #fff;
  }
  .btn-primary:hover { background: #085041; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary:disabled:hover { background: var(--teal); }

  /* RESULTADO */
  .result-header {
    text-align: center;
    margin-bottom: 1.5rem;
    padding: 0 0.5rem;
  }
  .result-header h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .result-header p { font-size: 14px; color: var(--text2); line-height: 1.6; }

  .result-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 10px;
    transition: box-shadow 0.2s;
  }
  .result-card.main {
    border-width: 2px;
  }
  .main-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 12px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .result-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .result-pct { font-size: 13px; margin-bottom: 10px; }
  .bar-track { background: var(--surface2); border-radius: 999px; height: 7px; margin-bottom: 12px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 999px; }
  .result-desc { font-size: 14px; color: var(--text2); line-height: 1.65; margin-bottom: 12px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag { font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 999px; }
  .result-action {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    border-left: 3px solid var(--border2);
  }

  .disclaimer {
    background: var(--blue-light);
    border: 1px solid #B5D4F4;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 13px;
    color: #0C447C;
    line-height: 1.6;
    margin-top: 1rem;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .disclaimer-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  .btn-restart {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 1rem;
    padding: 13px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: inherit;
    color: var(--text2);
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
  }
  .btn-restart:hover { background: var(--surface2); border-color: var(--border2); }

  @media (max-width: 480px) {
    .app-header h1 { font-size: 22px; }
    .card { padding: 1.25rem; }
    .question-text { font-size: 16px; }
    .option-btn { font-size: 14px; padding: 10px 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <div id="quiz-section">
    <div class="app-header">
      <div class="badge">🩺 Avaliação de Sintomas</div>
      <h1>Como você está se sentindo?</h1>
      <p>Responda 12 perguntas para identificar se seus sintomas indicam sinusite, rinite, alergia ou resfriado.</p>
    </div>

    <div class="card">
      <div class="progress-section">
        <div class="progress-meta">
          <span id="prog-label">Pergunta 1 de 12</span>
          <strong id="prog-pct">0%</strong>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="prog-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="question-num" id="q-num">Pergunta 1</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="q-options"></div>

      <div class="nav">
        <button class="btn btn-ghost" id="btn-back" onclick="goBack()">&#8592; Voltar</button>
        <button class="btn btn-primary" id="btn-next" onclick="goNext()" disabled>Próxima &#8594;</button>
      </div>
    </div>
  </div>

  <div id="result-section" style="display:none;"></div>
</div>

<script>
var questions = [
  { text: "Há quanto tempo você está com sintomas?", options: [
    { label: "Menos de 3 dias", icon: "⚡", weights: { rf: 3, si: 0, ri: 0, al: 0 } },
    { label: "Entre 3 e 7 dias", icon: "📅", weights: { rf: 2, si: 1, ri: 0, al: 0 } },
    { label: "Mais de 10 dias", icon: "⏳", weights: { rf: 0, si: 3, ri: 1, al: 0 } },
    { label: "Semanas ou meses (recorrente)", icon: "🔄", weights: { rf: 0, si: 0, ri: 3, al: 3 } },
  ]},
  { text: "Como está seu nariz?", options: [
    { label: "Entupido e escorregando bastante", icon: "🤧", weights: { rf: 2, si: 2, ri: 1, al: 1 } },
    { label: "Coriza clara e aguada abundante", icon: "💧", weights: { rf: 1, si: 0, ri: 3, al: 3 } },
    { label: "Entupido com secreção amarela ou verde", icon: "🟡", weights: { rf: 1, si: 4, ri: 0, al: 0 } },
    { label: "Coceira e espirros em sequência", icon: "🌬️", weights: { rf: 0, si: 0, ri: 2, al: 4 } },
    { label: "Estou bem do nariz", icon: "✅", weights: { rf: 0, si: 0, ri: 0, al: 0 } },
  ]},
  { text: "Você tem dor ou pressão no rosto?", options: [
    { label: "Sim, dor intensa nas bochechas, testa ou ao redor dos olhos", icon: "😣", weights: { rf: 0, si: 5, ri: 0, al: 0 } },
    { label: "Leve pressão ou desconforto", icon: "😕", weights: { rf: 1, si: 2, ri: 0, al: 0 } },
    { label: "Não tenho dor no rosto", icon: "😊", weights: { rf: 0, si: 0, ri: 0, al: 0 } },
  ]},
  { text: "Como estão seus olhos?", options: [
    { label: "Vermelhos, com coceira e lacrimejando", icon: "👁️", weights: { rf: 0, si: 0, ri: 1, al: 5 } },
    { label: "Um pouco irritados", icon: "😐", weights: { rf: 1, si: 0, ri: 1, al: 1 } },
    { label: "Normais, sem sintomas nos olhos", icon: "😌", weights: { rf: 0, si: 0, ri: 0, al: 0 } },
  ]},
  { text: "Você está com febre?", options: [
    { label: "Sim, febre alta (acima de 38,5°C)", icon: "🌡️", weights: { rf: 3, si: 2, ri: 0, al: 0 } },
    { label: "Febre baixa ou subfebril", icon: "🌡️", weights: { rf: 2, si: 1, ri: 0, al: 0 } },
    { label: "Não tenho febre", icon: "❄️", weights: { rf: 0, si: 0, ri: 2, al: 3 } },
  ]},
  { text: "Como está sua garganta?", options: [
    { label: "Com dor ou coceira intensa", icon: "😖", weights: { rf: 4, si: 1, ri: 0, al: 0 } },
    { label: "Leve irritação ou catarro descendo", icon: "😶", weights: { rf: 1, si: 2, ri: 1, al: 0 } },
    { label: "Normal", icon: "👍", weights: { rf: 0, si: 0, ri: 0, al: 1 } },
  ]},
  { text: "Você está com tosse?", options: [
    { label: "Sim, seca e frequente", icon: "💨", weights: { rf: 2, si: 0, ri: 0, al: 2 } },
    { label: "Sim, com catarro", icon: "🫁", weights: { rf: 2, si: 3, ri: 0, al: 0 } },
    { label: "Pouca ou nenhuma tosse", icon: "🤫", weights: { rf: 0, si: 0, ri: 2, al: 1 } },
  ]},
  { text: "Os sintomas pioram em algum momento específico?", options: [
    { label: "Ao acordar ou em ambientes com poeira e mofo", icon: "🌅", weights: { rf: 0, si: 0, ri: 4, al: 4 } },
    { label: "De manhã ou quando agacho a cabeça", icon: "⬇️", weights: { rf: 0, si: 4, ri: 0, al: 0 } },
    { label: "No contato com animais, flores ou jardim", icon: "🌸", weights: { rf: 0, si: 0, ri: 1, al: 5 } },
    { label: "Não percebi nenhum padrão", icon: "❓", weights: { rf: 2, si: 1, ri: 0, al: 0 } },
  ]},
  { text: "Você está com dor de cabeça?", options: [
    { label: "Sim, latejante ou na testa/nuca", icon: "🤕", weights: { rf: 2, si: 3, ri: 0, al: 0 } },
    { label: "Leve", icon: "😒", weights: { rf: 1, si: 1, ri: 0, al: 0 } },
    { label: "Não tenho dor de cabeça", icon: "😄", weights: { rf: 0, si: 0, ri: 2, al: 2 } },
  ]},
  { text: "Você sente fadiga ou cansaço geral?", options: [
    { label: "Muito cansado, me sinto abatido", icon: "😴", weights: { rf: 4, si: 2, ri: 0, al: 0 } },
    { label: "Um pouco cansado", icon: "😪", weights: { rf: 1, si: 1, ri: 1, al: 1 } },
    { label: "Não, estou com energia normal", icon: "⚡", weights: { rf: 0, si: 0, ri: 2, al: 2 } },
  ]},
  { text: "Você tem histórico de alergias ou asma?", options: [
    { label: "Sim, tenho diagnóstico de alergia/rinite/asma", icon: "📋", weights: { rf: 0, si: 0, ri: 3, al: 4 } },
    { label: "Tenho suspeita, mas sem diagnóstico", icon: "🤔", weights: { rf: 0, si: 0, ri: 1, al: 2 } },
    { label: "Não tenho histórico alérgico", icon: "🙅", weights: { rf: 1, si: 1, ri: 0, al: 0 } },
  ]},
  { text: "Você esteve em contato com alguém gripado recentemente?", options: [
    { label: "Sim, nos últimos 3–5 dias", icon: "🤝", weights: { rf: 5, si: 1, ri: 0, al: 0 } },
    { label: "Não sei / talvez", icon: "🤷", weights: { rf: 1, si: 1, ri: 0, al: 0 } },
    { label: "Não, não tive contato", icon: "🚫", weights: { rf: 0, si: 1, ri: 2, al: 2 } },
  ]},
];

var conditions = {
  rf: {
    name: "Resfriado Comum",
    color: var_("--blue"),
    barColor: var_("--blue-mid"),
    bgColor: var_("--blue-light"),
    tagBg: "#B5D4F4",
    tagColor: "#042C53",
    desc: "O resfriado é uma infecção viral aguda do trato respiratório superior. Costuma durar de 7 a 10 dias e é muito contagioso, se transmitindo por gotículas no ar ou contato com superfícies contaminadas.",
    symptoms: ["Coriza", "Dor de garganta", "Tosse", "Febre baixa", "Cansaço", "Espirros"],
    action: "Hidratação abundante, repouso e medicamentos sintomáticos. Procure um médico se a febre persistir por mais de 3 dias ou os sintomas piorarem após 10 dias."
  },
  si: {
    name: "Sinusite",
    color: var_("--amber"),
    barColor: var_("--amber-mid"),
    bgColor: var_("--amber-light"),
    tagBg: "#FAC775",
    tagColor: "#412402",
    desc: "A sinusite é a inflamação dos seios paranasais, frequentemente causada por infecção viral ou bacteriana que se instala após um resfriado. A secreção espessa e a dor facial são as marcas principais.",
    symptoms: ["Dor/pressão facial", "Secreção amarela/verde", "Tosse com catarro", "Dor de cabeça", "Mau hálito"],
    action: "Lavagens nasais com soro fisiológico e vapor quente aliviam os sintomas. Se houver febre alta ou sintomas por mais de 10 dias, consulte um médico — pode ser necessário antibiótico."
  },
  ri: {
    name: "Rinite",
    color: var_("--purple"),
    barColor: var_("--purple-mid"),
    bgColor: var_("--purple-light"),
    tagBg: "#CECBF6",
    tagColor: "#26215C",
    desc: "A rinite alérgica é a inflamação da mucosa nasal causada por alérgenos como ácaros, pólen, mofo e pelos de animais. É crônica e recorrente, mas controlável com tratamento médico adequado.",
    symptoms: ["Espirros em série", "Coriza clara", "Nariz entupido", "Coceira nasal", "Piora ao acordar"],
    action: "Evitar alérgenos conhecidos, usar capas antiácaros e manter o ambiente arejado. Anti-histamínicos e corticoides nasais prescritos por médico são muito eficazes no controle."
  },
  al: {
    name: "Alergia Respiratória",
    color: var_("--teal"),
    barColor: var_("--teal-mid"),
    bgColor: var_("--teal-light"),
    tagBg: "#9FE1CB",
    tagColor: "#04342C",
    desc: "A alergia respiratória é uma reação exagerada do sistema imune a substâncias ambientais como pólen, ácaros, pelos de animais e fungos. Os olhos costumam ser bastante afetados, diferenciando-a da rinite.",
    symptoms: ["Olhos vermelhos e coçando", "Espirros", "Lacrimejamento", "Piora em locais específicos", "Sem febre"],
    action: "Identificar e evitar o alérgeno é o primeiro passo. Um alergista pode indicar testes específicos, anti-histamínicos ou imunoterapia (vacina de alergia) para controle a longo prazo."
  }
};

function var_(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

var current = 0;
var answers = {};

function render() {
  var q = questions[current];
  document.getElementById('q-num').textContent = 'Pergunta ' + (current + 1);
  document.getElementById('q-text').textContent = q.text;

  var opts = document.getElementById('q-options');
  opts.innerHTML = '';
  q.options.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = '<span class="option-icon">' + opt.icon + '</span><span>' + opt.label + '</span>';
    btn.onclick = (function(idx){ return function(){ selectAnswer(idx); }; })(i);
    opts.appendChild(btn);
  });

  var pct = Math.round((current / questions.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = 'Pergunta ' + (current + 1) + ' de ' + questions.length;
  document.getElementById('btn-back').style.visibility = current === 0 ? 'hidden' : 'visible';

  var nextBtn = document.getElementById('btn-next');
  nextBtn.disabled = answers[current] === undefined;
  nextBtn.textContent = current === questions.length - 1 ? 'Ver resultado ✔' : 'Próxima →';
}

function selectAnswer(i) {
  answers[current] = i;
  document.querySelectorAll('.option-btn').forEach(function(btn, idx) {
    btn.classList.toggle('selected', idx === i);
  });
  document.getElementById('btn-next').disabled = false;
}

function goNext() {
  if (answers[current] === undefined) return;
  if (current < questions.length - 1) { current++; render(); }
  else showResult();
}

function goBack() {
  if (current > 0) { current--; render(); }
}

function showResult() {
  var scores = { rf: 0, si: 0, ri: 0, al: 0 };
  questions.forEach(function(q, qi) {
    var ai = answers[qi];
    if (ai !== undefined) {
      var w = q.options[ai].weights;
      Object.keys(w).forEach(function(k) { scores[k] += w[k]; });
    }
  });

  var total = Object.values(scores).reduce(function(a, b){ return a + b; }, 0) || 1;
  var sorted = Object.entries(scores).sort(function(a, b){ return b[1] - a[1]; });

  document.getElementById('quiz-section').style.display = 'none';
  var rs = document.getElementById('result-section');
  rs.style.display = 'block';

  var html = '<div class="result-header"><h2>Resultado da Avaliação</h2><p>Com base nos seus sintomas, confira a correspondência com cada condição abaixo. Este resultado não substitui um diagnóstico médico.</p></div>';

  sorted.forEach(function(entry, idx) {
    var key = entry[0];
    var score = entry[1];
    var c = conditions[key];
    var pct = Math.round((score / total) * 100);
    var isMain = idx === 0;

    html += '<div class="result-card' + (isMain ? ' main' : '') + '" style="border-color:' + (isMain ? c.barColor : '') + ';background:' + (isMain ? c.bgColor : '') + '">';

    if (isMain) {
      html += '<span class="main-badge" style="background:' + c.barColor + ';color:#fff;">✦ Mais provável</span><br>';
    }

    html += '<div class="result-name" style="color:' + c.color + '">' + c.name + '</div>';
    html += '<div class="result-pct" style="color:' + c.color + '">' + pct + '% de correspondência com seus sintomas</div>';
    html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + c.barColor + '"></div></div>';

    if (isMain) {
      html += '<div class="result-desc">' + c.desc + '</div>';
      html += '<div class="tags">';
      c.symptoms.forEach(function(s) {
        html += '<span class="tag" style="background:' + c.tagBg + ';color:' + c.tagColor + '">' + s + '</span>';
      });
      html += '</div>';
      html += '<div class="result-action"><strong>O que fazer:</strong> ' + c.action + '</div>';
    }

    html += '</div>';
  });

  html += '<div class="disclaimer"><span class="disclaimer-icon">ℹ️</span><div><strong>Aviso importante:</strong> Este teste é apenas informativo e não substitui a consulta com um médico ou profissional de saúde. Em caso de febre alta, dificuldade para respirar, dor intensa ou piora dos sintomas, procure atendimento médico imediatamente.</div></div>';
  html += '<button class="btn-restart" onclick="restart()">↺ Refazer o teste</button>';

  rs.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  current = 0;
  answers = {};
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
</body>
</html>
